apiVersion: apps/v1
kind: Deployment
metadata:
  name: velora-queue
  labels:
    app: velora-queue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: velora-queue
  template:
    metadata:
      labels:
        app: velora-queue
    spec:
      containers:
      - name: velora-queue
        image: velora/backend:latest
        command: ["/usr/bin/supervisord", "-n", "-c", "/etc/supervisord.conf"]
        envFrom:
        - configMapRef:
            name: velora-config
        - secretRef:
            name: velora-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: velora-queue-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: velora-queue
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
