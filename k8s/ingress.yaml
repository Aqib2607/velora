apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velora-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - velora.com
    - api.velora.com
    secretName: velora-tls-prod
  rules:
  - host: velora.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: velora-frontend
            port:
              number: 80
  - host: api.velora.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: velora-nginx-backend
            port:
              number: 80
