apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ml-gpu-inference
  namespace: velora-prod
spec:
  serviceName: ml-gpu-inference
  replicas: 2
  selector:
    matchLabels:
      app: ml-gpu-inference
  template:
    metadata:
      labels:
        app: ml-gpu-inference
        tier: ml-gpu
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - ml-gpu-inference
            topologyKey: kubernetes.io/hostname
      nodeSelector:
        accelerator: nvidia-tesla-a100
      containers:
      - name: gpu-inference
        image: registry.velora.io/ml-gpu-inference:latest
        imagePullPolicy: Always
        ports:
        - name: grpc
          containerPort: 50051
        - name: http
          containerPort: 8080
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1"
        - name: TF_FORCE_GPU_ALLOW_GROWTH
          value: "true"
        resources:
          requests:
            nvidia.com/gpu: 2
            cpu: 8
            memory: 32Gi
          limits:
            nvidia.com/gpu: 2
            cpu: 16
            memory: 64Gi
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
        volumeMounts:
        - name: model-cache
          mountPath: /models
        - name: gpu-shared-memory
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: ml-gpu-models-pvc
      - name: gpu-shared-memory
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ml-gpu-training
  namespace: velora-prod-infra
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: ml-training-sa
      nodeSelector:
        accelerator: nvidia-tesla-a100
      containers:
      - name: gpu-training
        image: registry.velora.io/ml-gpu-training:latest
        imagePullPolicy: Always
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1,2,3"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: MLFLOW_TRACKING_URI
          value: "gs://velora-mlflow"
        - name: MLFLOW_REGISTRY_URI
          value: "gs://velora-ml-registry"
        - name: BATCH_SIZE
          value: "256"
        - name: EPOCHS
          value: "100"
        resources:
          requests:
            nvidia.com/gpu: 4
            cpu: 32
            memory: 128Gi
          limits:
            nvidia.com/gpu: 4
            cpu: 64
            memory: 256Gi
        volumeMounts:
        - name: training-data
          mountPath: /data
        - name: models
          mountPath: /models
        - name: gpu-shared-memory
          mountPath: /dev/shm
      volumes:
      - name: training-data
        persistentVolumeClaim:
          claimName: ml-training-data-pvc
      - name: models
        persistentVolumeClaim:
          claimName: ml-models-pvc
      - name: gpu-shared-memory
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      restartPolicy: Never

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-gpu-models-pvc
  namespace: velora-prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-storage
  resources:
    requests:
      storage: 1Ti

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-training-data-pvc
  namespace: velora-prod-infra
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-storage
  resources:
    requests:
      storage: 2Ti

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ml-gpu-inference-pdb
  namespace: velora-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ml-gpu-inference

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ml-gpu-quota
  namespace: velora-prod
spec:
  hard:
    requests.nvidia.com/gpu: "8"
    limits.nvidia.com/gpu: "16"
    pods: "50"
    requests.cpu: "64"
    requests.memory: "256Gi"
    limits.cpu: "128"
    limits.memory: "512Gi"
